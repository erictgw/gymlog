    <button class="tab-btn" data-tab="legs" onclick="switchTab('legs')">LEGS</button>

  <div id="warmup-area"></div>
  <div id="exercises-area"></div>
  <div id="core-area"></div>
  <div id="summary-box" class="summary-box">
    <div class="summary-title">SESSION SUMMARY</div>

  <div class="actions">
    <span id="save-status" class="save-status" style="display:none"></span>

const rOpts = (sel,val) => REPS.map(r=>`<option value="${r}"${r==val?' selected':''}>${r} reps</option>`).join('');

// ── localStorage history (PB + last session) ──────────────────────────
// Schema: { [exerciseName]: { pb:{w,r}, last:{w,r,date} } }
const LS_KEY = 'gymlog_history_v1';

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e) { return {}; }
}

function saveHistory(h) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(h)); } catch(e) {}
}

// Merge session results into history: update PB if heavier, always update last
function updateHistory(sessionEntries, date) {
  const h = loadHistory();
  sessionEntries.forEach(({name, sets}) => {
    if (!sets || !sets.length) return;
    const maxW = Math.max(...sets.map(s=>s.w));
    const maxWSet = sets.find(s=>s.w===maxW) || sets[0];
    if (!h[name]) h[name] = {};
    // Update PB if new weight is heavier
    if (!h[name].pb || maxW > h[name].pb.w) {
      h[name].pb = {w:maxW, r:maxWSet.r};
    }
    // Always update last session
    const lastSet = sets[sets.length-1];
    h[name].last = {w:lastSet.w, r:lastSet.r, date:formatDate(date)};
  });
  saveHistory(h);
}

function formatDate(isoDate) {
  if (!isoDate) return '';
  const d = new Date(isoDate);
  return d.toLocaleDateString('en-SG',{day:'numeric',month:'short'});
}

// Get history for a single exercise — live from localStorage, fallback to HISTORY
function getHistory(name) {
  const live = loadHistory();
  if (live[name]) return live[name];
  return HISTORY[name] || null;
}

// ── Refresh history strip for a single exercise (after save) ──────────
function refreshHistoryStrip(name) {
  const id = exId(name);
  const h = getHistory(name);
  if (!h) return;
  const pbEl = document.getElementById(`pb_val_${id}`);
  const lastEl = document.getElementById(`last_val_${id}`);
  const lastLabelEl = document.getElementById(`last_label_${id}`);
  if (pbEl && h.pb) pbEl.innerHTML = `${h.pb.w}kg<span class="hist-sub">x ${h.pb.r} reps</span>`;
  if (lastEl && h.last) lastEl.innerHTML = `${h.last.w}kg<span class="hist-sub">x ${h.last.r} reps</span>`;
  if (lastLabelEl && h.last) lastLabelEl.textContent = `Last · ${h.last.date}`;
}

      <span class="set-num progressive">S${i+1}</span>
      <select onchange="onProgChange('${id}','${tab}','${name.replace(/'/g,"\\'")}')"><option value="">${wOpts(null,s.w)}</option></select>
      <select onchange="onProgChange('${id}','${tab}','${name.replace(/'/g,"\\'")}')"><option value="">${rOpts(null,s.r)}</option></select>
      <button class="del-btn" onclick="delSet('${id}','${s.id}','${tab}','${name.replace(/'/g,"\\'")}')">x</button>
    </div>`).join('');
  return `
    <div class="prog-col-heads">
      <div class="prog-col-head"></div>
      <div class="prog-col-head">Weight</div>
      <div class="prog-col-head">Reps</div>
      <div></div>
    </div>
    <div id="prog_rows_${id}">${rows}</div>
    <button class="add-set-btn" onclick="addSet('${id}','${tab}','${name.replace(/'/g,"\\'")}')">+ Add Set</button>`;
}

// ── Update preview ────────────────────────────────────────────────────
function updatePreview(id, tab) {
  const el = document.getElementById(`preview_${id}`);
  if (!el) return;
  const entry = logs[tab]?.[id] || (logs.core?.[id]);
  if (!entry || !entry.sets || !entry.sets.length) { el.innerHTML=''; return; }
  const color = modeAccent(entry.mode);
  el.innerHTML = entry.sets.map((s,i)=>`
    <div class="preview-row">
      <span class="preview-s" style="color:${color}">S${i+1}</span>
      <span class="preview-w">${s.w}kg x ${s.r} reps</span>
      <span style="color:${color};font-size:.54rem;margin-left:auto">${entry.mode}</span>
    </div>`).join('');
}

// ── Update set count badge ────────────────────────────────────────────
function updateSetCount(id, tab) {
  const sc = document.getElementById(`sc_${id}`);
  if (!sc) return;
  const entry = logs[tab]?.[id] || logs.core?.[id];
  if (!entry || !entry.sets || !entry.sets.length) { sc.textContent=''; return; }
  const n = entry.sets.length;
  sc.textContent = `${n} set${n!==1?'s':''}`;
}

// ── Toggle exercise open/close ────────────────────────────────────────
function toggleEx(id, tab, name) {
  const block = document.getElementById(id);
  const chk = document.getElementById(`chk_${id}`);
  const logStore = tab==='core' ? logs.core : logs[tab];
  const isOpen = block.classList.contains('open');

  if (!isOpen) {
    block.classList.add('open');
    const color = COLORS[tab];
    chk.style.background = color;
    chk.style.borderColor = color;
    chk.innerHTML = '✓';

    if (!logStore[id]) {
      const initSets = [mkRow(20,10),mkRow(20,10),mkRow(20,10)];
      logStore[id] = {mode:'Straight', ns:3, w:20, r:10, sets:initSets};
    }
    refreshInputs(id, tab, name);
  } else {
    block.classList.remove('open');
    chk.style.background = 'transparent';
    chk.style.borderColor = '#2a2a2a';
    chk.innerHTML = '';
    delete logStore[id];
    updateSummary();
  }
}

// ── Refresh input area ────────────────────────────────────────────────
function refreshInputs(id, tab, name) {
  const logStore = tab==='core' ? logs.core : logs[tab];
  const entry = logStore[id];
  if (!entry) return;
  const inputEl = document.getElementById(`inputs_${id}`);
  if (!inputEl) return;

  // Update mode pills
  document.getElementById(`mp_straight_${id}`).className = `mode-pill ${entry.mode==='Straight'?'active-straight':''}`;
  document.getElementById(`mp_progressive_${id}`).className = `mode-pill ${entry.mode==='Progressive'?'active-progressive':''}`;

  if (entry.mode === 'Straight') {
    inputEl.innerHTML = renderStraight(id, name, tab, entry.ns||3, entry.w||20, entry.r||10);
    // Rebuild sets from straight values
    entry.sets = Array.from({length:entry.ns||3}, () => mkRow(entry.w||20, entry.r||10));
  } else {
    inputEl.innerHTML = renderProgressive(id, name, tab, entry.sets);
  }
  updatePreview(id, tab);
  updateSetCount(id, tab);
  updateSummary();
}

// ── Mode switch ───────────────────────────────────────────────────────
function switchMode(id, tab, name, mode) {
  const logStore = tab==='core' ? logs.core : logs[tab];
  if (!logStore[id]) return;
  logStore[id].mode = mode;
  if (mode==='Progressive' && (!logStore[id].sets || !logStore[id].sets.length)) {
    const ns = logStore[id].ns||3;
    const w = logStore[id].w||20;
    const r = logStore[id].r||10;
    logStore[id].sets = Array.from({length:ns}, ()=>mkRow(w,r));
  }
  refreshInputs(id, tab, name);
}

// ── Straight change ───────────────────────────────────────────────────
function onStraightChange(id, tab, name) {
  const logStore = tab==='core' ? logs.core : logs[tab];
  const entry = logStore[id];
  if (!entry) return;
  const inputEl = document.getElementById(`inputs_${id}`);
  const sels = inputEl.querySelectorAll('select');
  entry.ns = Number(sels[0].value);
  entry.w  = Number(sels[1].value);
  entry.r  = Number(sels[2].value);
  entry.sets = Array.from({length:entry.ns}, ()=>mkRow(entry.w, entry.r));
  updatePreview(id, tab);
  updateSetCount(id, tab);
  updateSummary();
}

// ── Progressive change ────────────────────────────────────────────────
function onProgChange(id, tab, name) {
  const logStore = tab==='core' ? logs.core : logs[tab];
  const entry = logStore[id];
  if (!entry) return;
  const rowEls = document.querySelectorAll(`#prog_rows_${id} .set-row`);
  const newSets = [];
  rowEls.forEach((row,i) => {
    const sels = row.querySelectorAll('select');
    const sid = entry.sets[i]?.id || ++uid;
    newSets.push({id:sid, w:Number(sels[0].value), r:Number(sels[1].value)});
  });
  entry.sets = newSets;
  updatePreview(id, tab);
  updateSetCount(id, tab);
  updateSummary();
}

// ── Add set ───────────────────────────────────────────────────────────
function addSet(id, tab, name) {
  const logStore = tab==='core' ? logs.core : logs[tab];
  const entry = logStore[id];
  if (!entry) return;
  // sync current values first
  onProgChange(id, tab, name);
  const last = entry.sets[entry.sets.length-1] || {w:20,r:10};
  entry.sets.push(mkRow(last.w, last.r));
  refreshInputs(id, tab, name);
}

// ── Delete set ────────────────────────────────────────────────────────
function delSet(id, rowId, tab, name) {
  const logStore = tab==='core' ? logs.core : logs[tab];
  const entry = logStore[id];
  if (!entry) return;
  onProgChange(id, tab, name);
  entry.sets = entry.sets.filter(s => s.id !== Number(rowId));
  refreshInputs(id, tab, name);
}

// ── Toggle form panel ─────────────────────────────────────────────────
function toggleForm(id, e) {
  e.stopPropagation();
  const block = document.getElementById(id);
  if (!block.classList.contains('open')) {
    // Open the exercise first
    const btn = block.querySelector('.ex-header');
    if (btn) btn.click();
    setTimeout(()=>{
      const fp = document.getElementById(`fp_${id}`);
      const fb = document.getElementById(`fb_${id}`);
      if (fp) { fp.classList.toggle('show'); fb.classList.toggle('active'); fb.textContent = fp.classList.contains('show')?'FORM ▲':'FORM ▼'; }
    }, 50);
  } else {
    const fp = document.getElementById(`fp_${id}`);
    const fb = document.getElementById(`fb_${id}`);
    if (fp) { fp.classList.toggle('show'); fb.classList.toggle('active'); fb.textContent = fp.classList.contains('show')?'FORM ▲':'FORM ▼'; }
  }
}

// ── Render warmup ─────────────────────────────────────────────────────
function renderWarmup(tab) {
  const items = WARMUPS[tab];
  const titles = {push:'Push Day Prep', pull:'Pull Day Prep', legs:'Legs Day Prep'};
  const intros = {
    push:'Spend 8-12 min on these before touching any weights. Focus on shoulder mobility, chest opening and tricep activation.',
    pull:'Spend 8-12 min before your first pull exercise. Focus on lat activation and spinal decompression.',
    legs:'Spend 10-15 min before squats or heavy leg work. Focus on hip mobility and glute activation.',
  };
  const color = COLORS[tab];
  return `
    <div class="warmup-section">
      <div class="warmup-hdr" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.warmup-toggle').textContent=this.nextElementSibling.classList.contains('open')?'▲':'▼'">
        <div class="warmup-hdr-left">
          <span class="warmup-tag" style="border:1px solid ${color}66"">WARM UP</span>
          <span class="warmup-title">${titles[tab]}</span>
        </div>
        <span class="warmup-toggle">▼</span>
      </div>
      <div class="warmup-body">
        <p class="warmup-intro">${intros[tab]}</p>
        ${items.map((item,i)=>`
          <div class="warmup-item">
            <span class="warmup-num">${String(i+1).padStart(2,'0')}</span>
            <div style="flex:1"><div class="warmup-name">${item.name}</div><div class="warmup-desc">${item.desc}</div></div>
            <span class="warmup-badge badge-${item.kind}">${item.badge}</span>
          </div>`).join('')}
      </div>
    </div>`;
}

// ── Render exercise list ──────────────────────────────────────────────
function renderExercises(tab) {
  const groups = EXERCISES[tab];
  return Object.entries(groups).map(([group,list])=>`
    <div class="cat-wrap">
      <div class="cat-header">${group}</div>
      ${list.map(name=>buildExBlock(name,tab)).join('')}
    </div>`).join('');
}

// ── Render core ───────────────────────────────────────────────────────
function renderCore() {
  return `
    <div style="margin-top:.5rem;margin-bottom:1rem">
      <div class="core-hdr">
        <span class="core-label">Core</span>
        <span class="core-sub">- train any day</span>
      </div>
      ${ABS.map(name=>buildExBlock(name,'core')).join('')}
    </div>`;
}

// ── Update summary ────────────────────────────────────────────────────
function updateSummary() {
  const el = document.getElementById('summary-content');
  const dayEntries = Object.entries(logs[currentTab]).filter(([,v])=>v&&v.sets&&v.sets.length);
  const coreEntries = Object.entries(logs.core).filter(([,v])=>v&&v.sets&&v.sets.length);
  if (!dayEntries.length && !coreEntries.length) {
    el.innerHTML = '<span class="empty-msg">No exercises selected yet.</span>';
    return;
  }
  const color = COLORS[currentTab];
  const renderEntry = (name, val, dotColor) => `
    <div class="summary-ex">
      <div class="summary-ex-name">
        <span class="summary-dot" style="background:${dotColor}"></span>
        ${name}
        <span class="summary-mode" style="color:${modeAccent(val.mode)}">${val.mode}</span>
      </div>
      ${val.sets.map((s,i)=>`<div class="summary-set"><span class="summary-sn">S${i+1}</span><span class="summary-sv">${s.w}kg x ${s.r} reps</span></div>`).join('')}
    </div>`;

  let html = dayEntries.map(([id,val])=>{
    const name = val.name || id.replace(/^ex_/,'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    return renderEntry(val.displayName||id, val, color);
  }).join('');

  if (coreEntries.length) {
    html += `<div class="core-divider">Core</div>`;
    html += coreEntries.map(([id,val])=>renderEntry(val.displayName||id, val, COLORS.core)).join('');
  }
  el.innerHTML = html;
}

// ── Tab switch ────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.className = 'tab-btn';
    if (b.dataset.tab===tab) b.classList.add(`active-${tab}`);
  });
  document.getElementById('warmup-area').innerHTML = renderWarmup(tab);
  document.getElementById('exercises-area').innerHTML = renderExercises(tab);
  updateSummary();
}

// ── Clear all ─────────────────────────────────────────────────────────
function clearAll() {
  ['push','pull','legs','core'].forEach(t => { for(let k in logs[t]) delete logs[t][k]; });
  switchTab(currentTab);
  renderCoreSection();
  updateSummary();
}

function renderCoreSection() {
  document.getElementById('core-area').innerHTML = renderCore();
}

// ── Save session ──────────────────────────────────────────────────────
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz--xee780Q7YAYb4fG3qAk3YKOwWNJuEIXdc2lcCNvYKV1B0zEi4PvFAkfKgYvrygL0g/exec";

async function saveSession() {
  const date = document.getElementById('sessionDate').value;
  const dayLabel = currentTab.charAt(0).toUpperCase()+currentTab.slice(1);
  const rows = [];
  const sessionEntries = [];

  const cleanName = id => id.replace(/^ex_/,'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());

  Object.entries(logs[currentTab]).forEach(([id,val])=>{
    if (!val||!val.sets||!val.sets.length) return;
    const name = cleanName(id);
    sessionEntries.push({name, sets:val.sets});
    val.sets.forEach((s,i)=>rows.push({date,day:dayLabel,exercise:name,category:dayLabel,mode:val.mode,set:`S${i+1}`,weight:s.w,reps:s.r}));
  });
  Object.entries(logs.core).forEach(([id,val])=>{
    if (!val||!val.sets||!val.sets.length) return;
    const name = cleanName(id);
    sessionEntries.push({name, sets:val.sets});
    val.sets.forEach((s,i)=>rows.push({date,day:dayLabel,exercise:name,category:'Core',mode:val.mode,set:`S${i+1}`,weight:s.w,reps:s.r}));
  });

  if (!rows.length) { showStatus('No exercises logged yet','err'); return; }

  showStatus('Saving to Google Sheet...','saving');
  document.getElementById('saveBtn').classList.add('saving');
  document.getElementById('saveBtn').textContent = 'Saving...';

  // ── Update localStorage PB + Last ─────────────────────────────────
  updateHistory(sessionEntries, date);
  sessionEntries.forEach(({name})=>refreshHistoryStrip(name));

  // ── POST to Google Sheets via Apps Script ─────────────────────────
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({rows})
    });
    // no-cors means we can't read the response body, but if no error thrown it worked
    showStatus(`Saved ${rows.length} sets to Google Sheet ✓`,'ok');
  } catch(err) {
    // Fallback: download CSV if fetch fails
    const header = 'Date,Day,Exercise,Category,Mode,Set,Weight (kg),Reps\n';
    const csv = header + rows.map(r=>[r.date,r.day,r.exercise,r.category,r.mode,r.set,r.weight,r.reps].map(v=>`"${v}"`).join(',')).join('\n');
    const blob = new Blob([csv],{type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=`gym-log-${date}.csv`; a.click();
    URL.revokeObjectURL(url);
    showStatus('Sheet unavailable — CSV downloaded instead','err');
  }

  document.getElementById('saveBtn').classList.remove('saving');
  document.getElementById('saveBtn').textContent = 'Save Session';
  setTimeout(()=>{ document.getElementById('save-status').style.display='none'; }, 5000);
}

function showStatus(msg, type) {
  const el = document.getElementById('save-status');
  el.textContent = msg;
  el.className = `save-status ${type}`;
  el.style.display = 'inline';
}

// ── Store display names when toggling ─────────────────────────────────
// Patch toggleEx to also store the display name
const _origToggleEx = toggleEx;

// ── Init ──────────────────────────────────────────────────────────────
document.getElementById('sessionDate').valueAsDate = new Date();
switchTab('push');
document.getElementById('core-area').innerHTML = renderCore();
</script>
